name: Generate Blog Feed JSON

on:
  discussion:
    types: [created]   # triggert alleen bij nieuwe discussion, niet bij edits
  workflow_dispatch:

concurrency:
  group: blog-feed
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch discussions and generate blog_feed.json
        env:
          GITHUB_TOKEN: ${{ secrets.REVIEWS_PAT }}
          REPO: 'huizebruin/s0tool'
          CATEGORY_ID: 'DIC_kwDOGVgygc4C5WOf'
        run: |
          python3 - << 'EOF'
          import requests, json, os
          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['REPO']
          category_id = os.environ['CATEGORY_ID']
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github.v3+json"
          }
          url = f"https://api.github.com/repos/{repo}/discussions?category_id={category_id}&per_page=100"
          resp = requests.get(url, headers=headers)
          discussions = resp.json()

          feed = [
              {
                  "title": d['title'],
                  "url": d['html_url'],
                  "created_at": d['created_at'],
                  "author": d['user']['login'],
                  "body": d.get('body', '')
              }
              for d in discussions
          ]

          output_path = "static/blog_feed.json"
          with open(output_path, "w") as f:
              json.dump(feed, f, indent=2)
          EOF

      - name: Commit en maak Pull Request aan
        env:
          GH_TOKEN: ${{ secrets.REVIEWS_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/blog_feed.json
          git diff --cached --quiet && echo "Geen wijzigingen." && exit 0

          BRANCH="blog/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update blog_feed.json"
          git push https://x-access-token:${GH_TOKEN}@github.com/huizebruin/s0tool.git "$BRANCH"

          gh pr create \
            --title "chore: update blog_feed.json" \
            --body "Automatisch aangemaakt door de Blog Feed Action. blog_feed.json bijgewerkt met nieuwe blog posts." \
            --base main \
            --head "$BRANCH"