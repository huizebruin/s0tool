name: Fetch Reviews

on:
  schedule:
    - cron: '0 */6 * * *'   
  workflow_dispatch:          

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews from GitHub Discussions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node static/js/fetch-reviews.js

      - name: Commit and push reviews.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/reviews.json
          git diff --cached --quiet || git commit -m "chore: update reviews.json"
          git push
