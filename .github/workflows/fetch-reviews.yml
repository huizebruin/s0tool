name: Fetch Reviews

on:
  issues:
    types: [labeled]   # triggert wanneer een label wordt toegevoegd aan een issue
  workflow_dispatch:

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    # Alleen uitvoeren als het label 'meter-review' is — of handmatig gestart
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'meter-review'
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews from issues
        env:
          GITHUB_TOKEN: ${{ secrets.REVIEWS_PAT }}
        run: node static/js/fetch-reviews.js

      - name: Commit en maak Pull Request aan
        env:
          GH_TOKEN: ${{ secrets.REVIEWS_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/reviews.json
          git diff --cached --quiet && echo "Geen wijzigingen." && exit 0

          BRANCH="reviews/update-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "chore: update reviews.json"
          git push https://x-access-token:${GH_TOKEN}@github.com/huizebruin/s0tool.git "$BRANCH"

          gh pr create \
            --title "chore: update reviews.json" \
            --body "Automatisch aangemaakt door de Fetch Reviews Action. Reviews.json bijgewerkt met nieuwe meter reviews." \
            --base main \
            --head "$BRANCH"
