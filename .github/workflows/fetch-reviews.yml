name: Fetch Reviews

on:
  schedule:
    - cron: '0 */6 * * *'   # elke 6 uur
  workflow_dispatch:          # ook handmatig te starten

jobs:
  fetch-reviews:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch reviews from issues
        env:
          GITHUB_TOKEN: ${{ secrets.REVIEWS_PAT }}
        run: node static/js/fetch-reviews.js

      - name: Commit and push reviews.json
        env:
          REVIEWS_PAT: ${{ secrets.REVIEWS_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/reviews.json
          git diff --cached --quiet && echo "Geen wijzigingen, niets te pushen." && exit 0
          git commit -m "chore: update reviews.json"
          git push https://x-access-token:${REVIEWS_PAT}@github.com/huizebruin/s0tool.git HEAD:main
